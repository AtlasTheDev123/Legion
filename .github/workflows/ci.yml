name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-venv build-essential

      - name: Create and activate virtualenv
        run: |
          python3 -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip setuptools wheel

      - name: Install Python requirements
        run: |
          . .venv/bin/activate
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

      - name: Run tests
        run: |
          . .venv/bin/activate
          if [ -f run_tests.sh ]; then chmod +x run_tests.sh; ./run_tests.sh; else python -m pytest -q; fi
name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt || echo 'no dev requirements'

      - name: Validate JSON
        run: |
          python - <<'PY'
import json,sys
p='schemas/functions.json'
try:
    with open(p,'r',encoding='utf-8') as f:
        json.load(f)
    print('JSON valid:',p)
except Exception as e:
    print('JSON invalid:',e); sys.exit(1)
PY

      - name: Lint (ruff)
        run: |
          python -m pip install ruff
          ruff check . || true

      - name: Typecheck (mypy)
        run: |
          python -m pip install mypy
          mypy --ignore-missing-imports . || true

      - name: Format check (black)
        run: |
          python -m pip install black
          black --check . || true

      - name: Run tests
        run: |
          pytest -q
name: CI
on: [push, pull_request]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install deps
        run: python -m pip install --upgrade pip
      - name: Validate functions.json
        run: python -c "import json; json.load(open('schemas/functions.json'))" 
      - name: Python compile check
        run: |
          python -m py_compile $(git ls-files "*.py" | tr '\n' ' ')
