<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legion Voice Assistant - AI Companion</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="assistant-container">
        <!-- Main Content Area -->
        <div class="main-content">
            <div class="greeting-text">
                <h1>Welcome to Legion</h1>
                <p>Your AI assistant is ready to listen</p>
            </div>

            <!-- Conversation Display -->
            <div class="conversation-log">
                <div class="log-header">Conversation History</div>
                <div class="messages-container" id="messagesContainer">
                    <div class="system-message">
                        <span class="timestamp">Ready</span>
                        <p>Waiting for your voice input or tap to start speaking...</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Avatar Section (Bottom Right Corner) -->
        <div class="avatar-section">
            <!-- Avatar Container -->
            <div class="avatar-container" id="avatarContainer">
                <svg class="avatar-svg" viewBox="0 0 200 280" xmlns="http://www.w3.org/2000/svg">
                    <!-- Background Head -->
                    <defs>
                        <linearGradient id="headGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#e8d5f2;stop-opacity:1" />
                            <stop offset="100%" style="stop-color:#d4b5e8;stop-opacity:1" />
                        </linearGradient>
                        <filter id="glow">
                            <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
                            <feMerge>
                                <feMergeNode in="coloredBlur"/>
                                <feMergeNode in="SourceGraphic"/>
                            </feMerge>
                        </filter>
                    </defs>

                    <!-- Head -->
                    <circle cx="100" cy="100" r="70" fill="url(#headGradient)" class="head"/>

                    <!-- Eyes Container -->
                    <g class="eyes" id="eyes">
                        <!-- Left Eye -->
                        <circle cx="75" cy="85" r="12" fill="#ffffff" class="eye-white"/>
                        <circle cx="75" cy="85" r="8" fill="#6b5b95" class="iris" id="leftIris"/>
                        <circle cx="77" cy="82" r="3" fill="#ffffff" class="pupil-shine"/>

                        <!-- Right Eye -->
                        <circle cx="125" cy="85" r="12" fill="#ffffff" class="eye-white"/>
                        <circle cx="125" cy="85" r="8" fill="#6b5b95" class="iris" id="rightIris"/>
                        <circle cx="127" cy="82" r="3" fill="#ffffff" class="pupil-shine"/>

                        <!-- Eyebrows -->
                        <path d="M 65 70 Q 75 65 85 70" stroke="#8b7ba8" stroke-width="2.5" fill="none" stroke-linecap="round" class="eyebrow left-eyebrow" id="leftEyebrow"/>
                        <path d="M 115 70 Q 125 65 135 70" stroke="#8b7ba8" stroke-width="2.5" fill="none" stroke-linecap="round" class="eyebrow right-eyebrow" id="rightEyebrow"/>
                    </g>

                    <!-- Mouth -->
                    <g class="mouth" id="mouth">
                        <path d="M 80 140 Q 100 155 120 140" stroke="#c9a8d8" stroke-width="2.5" fill="none" stroke-linecap="round" class="mouth-line"/>
                        <circle cx="100" cy="145" r="2" fill="#c9a8d8" class="mouth-shine"/>
                    </g>

                    <!-- Ears (subtle) -->
                    <circle cx="35" cy="100" r="8" fill="#d4b5e8" opacity="0.7"/>
                    <circle cx="165" cy="100" r="8" fill="#d4b5e8" opacity="0.7"/>
                </svg>

                <!-- Status Indicator -->
                <div class="status-indicator" id="statusIndicator">
                    <span class="status-dot idle" id="statusDot"></span>
                    <span class="status-text" id="statusText">Ready</span>
                </div>
            </div>

            <!-- Voice Input Controls -->
            <div class="voice-controls">
                <!-- Mic Button -->
                <button class="voice-button" id="voiceButton" title="Press to speak">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z" fill="currentColor"/>
                        <path d="M17 16.91c-1.48 1.46-3.51 2.36-5.7 2.36-2.19 0-4.22-.9-5.7-2.36M19 12h2c0 .64-.09 1.28-.29 1.9M5 12H3c0-.64.09-1.28.29-1.9" fill="currentColor"/>
                    </svg>
                </button>

                <!-- Tap to Speak Text -->
                <span class="tap-hint" id="tapHint">Tap to speak</span>

                <!-- Visualization Bars -->
                <div class="voice-visualization" id="voiceVisualization">
                    <div class="bar" style="--delay: 0s"></div>
                    <div class="bar" style="--delay: 0.1s"></div>
                    <div class="bar" style="--delay: 0.2s"></div>
                    <div class="bar" style="--delay: 0.3s"></div>
                    <div class="bar" style="--delay: 0.4s"></div>
                </div>
            </div>

            <!-- Settings Icon -->
            <button class="settings-button" id="settingsButton" title="Settings">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="12" cy="12" r="2" fill="currentColor"/>
                    <path d="M12 1c-.552 0-1 .448-1 1v2.09A7.001 7.001 0 0 0 5.91 8H3c-.552 0-1 .448-1 1 0 .552.448 1 1 1h2.09a7 7 0 0 0 5.01 5.01V20c0 .552.448 1 1 1s1-.448 1-1v-2.09a7 7 0 0 0 5.01-5.01H21c.552 0 1-.448 1-1 0-.552-.448-1-1-1h-2.09A7.001 7.001 0 0 0 13 4.09V2c0-.552-.448-1-1-1z" fill="currentColor" opacity="0.6"/>
                </svg>
            </button>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="settings-modal" id="settingsModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Settings</h2>
                <button class="close-button" id="closeSettings" title="Close">×</button>
            </div>
            <div class="modal-body">
                <div class="setting-item">
                    <label for="volumeControl">Volume</label>
                    <input type="range" id="volumeControl" min="0" max="100" value="70" class="slider">
                </div>
                <div class="setting-item">
                    <label for="speechRate">Speech Rate</label>
                    <input type="range" id="speechRate" min="0.5" max="2" step="0.1" value="1" class="slider">
                </div>
                <div class="setting-item">
                    <label for="theme">Avatar Expression</label>
                    <select id="theme" class="dropdown">
                        <option value="neutral">Neutral</option>
                        <option value="friendly">Friendly</option>
                        <option value="professional">Professional</option>
                    </select>
                </div>
                <div class="setting-item">
                    <label for="autoPlay">Auto-play responses</label>
                    <input type="checkbox" id="autoPlay" class="checkbox" checked>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast"></div>

    <script src="avatar.js"></script>
    <script src="voice-control.js"></script>
    <script src="app.js"></script>
</body>
</html>
